services:
  ecowitt-prom:
    build:
      context: ../..
      dockerfile: docker/local/Dockerfile
    container_name: ecowitt-prom
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
    networks:
      - monitoring
    restart: unless-stopped

networks:
  monitoring:
    external: true
